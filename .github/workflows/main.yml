name: Update Lunar Calendar ICS

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'  # Chạy vào 00:00 ngày 1 hàng tháng
  workflow_dispatch:      # Cho phép chạy thủ công từ tab Actions

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Cho phép action push code ngược lại repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Calendar files
        run: |
          # Chạy script để tạo file tổng hợp và file riêng từng năm
          python main.py --split

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update lunar calendar files [skip ci]" && git push)
